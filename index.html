<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Bot</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc3545">

<style>
body{font-family:Arial,sans-serif;background:#111;color:white;margin:0;padding:0;}
header{background:#dc3545;color:white;padding:20px;text-align:center;}
#alerta{background:#ff4444;color:white;text-align:center;padding:10px;display:none;font-weight:bold;animation: flash 1s infinite;}
@keyframes flash{0%,100%{opacity:1;}50%{opacity:0.5;}}
#busqueda{width:90%;max-width:500px;padding:10px;margin:10px auto;display:block;border-radius:5px;border:none;font-size:16px;}
#news{display:flex;flex-wrap:wrap;justify-content:center;padding:10px;}
.card{background:#222;border-radius:10px;margin:10px;width:300px;box-shadow:0 0 10px #000;overflow:hidden;transition: transform 0.2s, box-shadow 0.2s;cursor:pointer;position:relative;}
.card:hover{transform: scale(1.03);box-shadow:0 0 20px #dc3545;}
.card img{width:100%;height:170px;object-fit:cover;}
.card .content{padding:10px;}
.card h3{margin:0 0 5px 0;font-size:18px;}
.card p{font-size:14px;color:#ccc;}
.card a{color:#0d6efd;text-decoration:none;font-weight:bold;display:block;margin-top:5px;}
.new-badge{position:absolute;top:10px;right:10px;background:red;color:white;padding:3px 7px;font-size:12px;border-radius:5px;font-weight:bold;}
#instalarBtn{position:fixed;bottom:20px;right:20px;padding:10px;background:#dc3545;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer;display:none;z-index:1000;}
</style>
</head>
<body>

<header><h1>📰 Mencho News Bot</h1></header>
<div id="alerta">🚨 NUEVA NOTICIA DETECTADA</div>
<input type="text" id="busqueda" placeholder="Buscar palabra dentro de noticias (opcional)">
<div id="news">Cargando noticias...</div>
<button id="instalarBtn">📲 Instalar App</button>

<script>
// Fuentes RSS (Google News en español)
const rssSources = [
 "https://news.google.com/rss/search?q=El+Mencho&hl=es-419&gl=MX&ceid=MX:es",
 "https://news.google.com/rss/search?q=El+Mencho+site:milenio.com&hl=es-419&gl=MX&ceid=MX:es",
 "https://news.google.com/rss/search?q=El+Mencho+site:reforma.com&hl=es-419&gl=MX&ceid=MX:es",
 "https://news.google.com/rss/search?q=El+Mencho+site:eluniversal.com.mx&hl=es-419&gl=MX&ceid=MX:es"
];

let noticiasViejas = new Set();

async function cargarNoticias() {
  let noticias = [];
  for(const src of rssSources){
    try{
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(src)}`);
      const d = await r.json();
      const parser = new DOMParser();
      const xml = parser.parseFromString(d.contents,"text/xml");
      xml.querySelectorAll("item").forEach(n=>{
        noticias.push({
          title: n.querySelector("title")?.textContent,
          link: n.querySelector("link")?.textContent,
          date: n.querySelector("pubDate")?.textContent,
          isNew: false
        });
      });
    }catch(e){console.log("Error cargando RSS:",src);}
  }

  // Filtrar por busqueda opcional
  const busqueda = document.getElementById("busqueda").value;
  if(busqueda) noticias = noticias.filter(n=>n.title.toLowerCase().includes(busqueda.toLowerCase()));

  // Detectar noticias nuevas (solo las que no existían antes)
  noticias.forEach(n=>{
    if(!noticiasViejas.has(n.title)){
      n.isNew = true;
    }
  });

  // Guardar títulos actuales para la siguiente carga
  noticiasViejas = new Set(noticias.map(n=>n.title));

  // Ordenar: noticias nuevas primero
  noticias.sort((a,b)=>{
    if(a.isNew && !b.isNew) return -1;
    if(!a.isNew && b.isNew) return 1;
    return new Date(b.date) - new Date(a.date);
  });

  // Alerta si hay nueva noticia
  const primeraNueva = noticias.find(n=>n.isNew)?.title;
  if(primeraNueva){
    document.getElementById("alerta").style.display="block";
    enviarNotificacion(primeraNueva);
    setTimeout(()=>document.getElementById("alerta").style.display="none",5000);
  }

  // Renderizar tarjetas
  let html="";
  noticias.forEach(n=>{
    html+=`
    <div class="card" onclick="window.open('${n.link}','_blank')">
      ${n.isNew ? '<div class="new-badge">NUEVA</div>' : ''}
      <div class="content">
        <h3>${n.title}</h3>
        <p>${n.date}</p>
        <a href="${n.link}" target="_blank">Leer noticia</a>
      </div>
    </div>`;
  });
  document.getElementById("news").innerHTML=html;
}

// Refresh automático cada 30 segundos
setInterval(cargarNoticias,30000);
cargarNoticias();

// Buscador
document.getElementById("busqueda").addEventListener("keyup", e=>{
  if(e.key==="Enter") cargarNoticias();
});

// Notificaciones
if('Notification' in window){
  Notification.requestPermission();
}
function enviarNotificacion(titulo){
  if(Notification.permission==="granted"){
    new Notification("🚨 Nueva noticia Mencho",{body:titulo,icon:"icon.png"});
  }
}

// Botón de instalación PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById("instalarBtn");
  btn.style.display = "block";
  btn.addEventListener('click', ()=>{
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{btn.style.display='none';});
  });
});

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
