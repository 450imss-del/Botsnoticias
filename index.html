<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Guadalajara</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<style>
body{font-family:Arial;background:#111;color:white;padding:10px;}
h1{text-align:center;color:#0d6efd;}
.card{background:#222;padding:10px;margin:10px;border-radius:10px;}
a{color:#0d6efd;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>

<h1>📰 Noticias Guadalajara</h1>
<div id="news">Cargando...</div>

<script>
const url="https://api.allorigins.win/get?url="+
encodeURIComponent("https://news.google.com/rss/search?q=Guadalajara%20Jalisco&hl=es-419&gl=MX&ceid=MX:es");

fetch(url)
.then(r=>r.json())
.then(d=>{
  const parser=new DOMParser();
  const xml=parser.parseFromString(d.contents,"text/xml");
  const items=xml.querySelectorAll("item");
  let html="";
  items.forEach(n=>{
    html+=`<div class="card">
      <h3>${n.querySelector("title").textContent}</h3>
      <a href="${n.querySelector("link").textContent}" target="_blank">Leer más</a>
    </div>`;
  });
  document.getElementById("news").innerHTML=html;
});
</script>

<script>
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
