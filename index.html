<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mencho News Bot</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc3545">

<!-- Estilos modernos y animaciones -->
<style>
body{
  font-family: 'Arial', sans-serif;
  background:#111;
  color:white;
  margin:0;
  padding:0;
}
header{
  background:#dc3545;
  color:white;
  padding:20px;
  text-align:center;
}
#alerta{
  background:#ff4444;
  color:white;
  text-align:center;
  padding:10px;
  display:none;
  font-weight:bold;
  animation: flash 1s infinite;
}
@keyframes flash{
  0%,100%{opacity:1;}
  50%{opacity:0.5;}
}
#busqueda{
  width:90%;
  max-width:500px;
  padding:10px;
  margin:10px auto;
  display:block;
  border-radius:5px;
  border:none;
  font-size:16px;
}
#news{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:10px;
}
.card{
  background:#222;
  border-radius:10px;
  margin:10px;
  width:300px;
  box-shadow:0 0 10px #000;
  overflow:hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor:pointer;
}
.card:hover{
  transform: scale(1.03);
  box-shadow:0 0 20px #dc3545;
}
.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}
.card .content{
  padding:10px;
}
.card h3{
  margin:0 0 5px 0;
  font-size:18px;
}
.card p{
  font-size:14px;
  color:#ccc;
}
.card a{
  color:#0d6efd;
  text-decoration:none;
  font-weight:bold;
  display:block;
  margin-top:5px;
}
</style>
</head>
<body>

<header>
<h1>📰 Mencho News Bot</h1>
</header>

<div id="alerta">🚨 NUEVA NOTICIA DETECTADA</div>

<input type="text" id="busqueda" placeholder="Buscar palabra (CJNG, captura, Jalisco...)">

<div id="news">Cargando noticias...</div>

<script>
let ultimaNoticia="";

async function cargarNoticias(query="El Mencho CJNG Jalisco narcotrafico"){
  const url="https://api.allorigins.win/get?url="+
    encodeURIComponent(`https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=es-419&gl=MX&ceid=MX:es`);
  
  const res = await fetch(url);
  const data = await res.json();
  const parser = new DOMParser();
  const xml = parser.parseFromString(data.contents,"text/xml");
  const items = xml.querySelectorAll("item");
  
  let html="";
  const primera = items[0]?.querySelector("title")?.textContent;

  // Alerta si hay noticia nueva
  if(ultimaNoticia && ultimaNoticia !== primera){
    document.getElementById("alerta").style.display="block";
    enviarNotificacion(primera);
    setTimeout(()=>document.getElementById("alerta").style.display="none",5000);
  }
  ultimaNoticia = primera;

  items.forEach(n=>{
    const titulo = n.querySelector("title")?.textContent;
    const fecha = n.querySelector("pubDate")?.textContent;
    const link = n.querySelector("link")?.textContent;
    const img = n.querySelector("media\\:thumbnail, thumbnail")?.getAttribute("url") || "";

    html+=`
    <div class="card" onclick="window.open('${link}','_blank')">
      ${img ? `<img src="${img}">` : ""}
      <div class="content">
        <h3>${titulo}</h3>
        <p>${fecha}</p>
        <a href="${link}" target="_blank">Leer noticia</a>
      </div>
    </div>`;
  });

  document.getElementById("news").innerHTML=html;
}

// Refresh automático cada 30 segundos
setInterval(()=>cargarNoticias(document.getElementById("busqueda").value || "El Mencho CJNG Jalisco narcotrafico"),30000);
cargarNoticias();

// Buscador manual
document.getElementById("busqueda").addEventListener("keyup",e=>{
  if(e.key==="Enter"){
    cargarNoticias(e.target.value);
  }
});

// Notificaciones
if('Notification' in window){
  Notification.requestPermission();
}
function enviarNotificacion(titulo){
  if(Notification.permission==="granted"){
    new Notification("🚨 Nueva noticia Mencho",{
      body: titulo,
      icon:"icon.png"
    });
  }
}
</script>

<script>
// Service Worker para PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
