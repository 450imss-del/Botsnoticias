<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias El Mencho</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc3545">

<style>
body{font-family:Arial;background:#111;color:white;padding:10px;}
h1{text-align:center;color:#dc3545;}
.card{background:#222;padding:10px;margin:10px;border-radius:10px;}
a{color:#0d6efd;text-decoration:none;font-weight:bold;}
input{width:100%;padding:8px;border-radius:5px;border:none;margin-bottom:10px;}
</style>
</head>
<body>

<h1>📰 Noticias del Mencho</h1>
<input id="busqueda" placeholder="Buscar palabra (CJNG, captura, Jalisco)">

<div id="news">Cargando...</div>

<script>
function cargarNoticias(q="El Mencho CJNG Jalisco narcotrafico"){
 const url="https://api.allorigins.win/get?url="+
 encodeURIComponent(`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=es-419&gl=MX&ceid=MX:es`);

 fetch(url)
 .then(r=>r.json())
 .then(d=>{
   const parser=new DOMParser();
   const xml=parser.parseFromString(d.contents,"text/xml");
   const items=xml.querySelectorAll("item");
   let html="";
   items.forEach(n=>{
     html+=`
     <div class="card">
       <h3>${n.querySelector("title").textContent}</h3>
       <p>${n.querySelector("pubDate").textContent}</p>
       <a href="${n.querySelector("link").textContent}" target="_blank">Leer noticia</a>
     </div>`;
   });
   document.getElementById("news").innerHTML=html;
 });
}

cargarNoticias();

// buscador manual
document.getElementById("busqueda").addEventListener("keyup",e=>{
 if(e.key==="Enter"){
   cargarNoticias(e.target.value);
 }
});
</script>

<script>
if('serviceWorker' in navigator){
 navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
