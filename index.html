<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mencho News Bot</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc3545">

<style>
body{font-family:Arial;background:#111;color:white;padding:10px;}
h1{text-align:center;color:#dc3545;}
.card{background:#222;padding:10px;margin:10px;border-radius:10px;}
a{color:#0d6efd;text-decoration:none;font-weight:bold;}
#alerta{background:red;padding:10px;text-align:center;display:none;}
</style>
</head>
<body>

<div id="alerta">🚨 NUEVA NOTICIA DETECTADA</div>
<h1>📰 Mencho News Bot</h1>
<div id="news">Cargando...</div>

<script>
let ultimaNoticia="";

async function cargarNoticias(){
 const url="https://api.allorigins.win/get?url="+
 encodeURIComponent("https://news.google.com/rss/search?q=El%20Mencho%20CJNG&hl=es-419&gl=MX&ceid=MX:es");

 const r=await fetch(url);
 const d=await r.json();
 const parser=new DOMParser();
 const xml=parser.parseFromString(d.contents,"text/xml");
 const items=xml.querySelectorAll("item");

 let html="";
 let primera = items[0].querySelector("title").textContent;

 // alerta si cambia noticia
 if(ultimaNoticia && ultimaNoticia !== primera){
   document.getElementById("alerta").style.display="block";
   enviarNotificacion(primera);
 }

 ultimaNoticia = primera;

 items.forEach(n=>{
   html+=`
   <div class="card">
     <h3>${n.querySelector("title").textContent}</h3>
     <p>${n.querySelector("pubDate").textContent}</p>
     <a href="${n.querySelector("link").textContent}" target="_blank">Leer</a>
   </div>`;
 });

 document.getElementById("news").innerHTML=html;
}

// refresh automático cada 30 segundos
setInterval(cargarNoticias,30000);
cargarNoticias();
</script>

<script>
if('serviceWorker' in navigator){
 navigator.serviceWorker.register("sw.js");
}

// pedir permiso notificaciones
Notification.requestPermission();
function enviarNotificacion(titulo){
 if(Notification.permission==="granted"){
   new Notification("🚨 Nueva noticia Mencho",{
     body: titulo,
     icon:"icon.png"
   });
 }
}
</script>

</body>
</html>
